id: tmall-ops-assistant
name: 天猫运营助手
version: 0.1.0
author: codex
description: "抓取天猫商品链接下的买家评价数据，支持批量链接导出"
entry_url: https://detail.tmall.com/item.htm
tab_match_prefixes:
  - https://detail.tmall.com/
  - https://item.taobao.com/
  - https://www.tmall.com/
  - https://rate.tmall.com/

auth:
  check_script: auth_check.js
  login_url: https://login.taobao.com/member/login.jhtml

tasks:
  - id: buyer_reviews
    name: 买家评价抓取
    description: 输入一个或多个天猫商品链接，抓取买家评价、评价时间、规格、图片和追评信息
    script: buyer-reviews.js
    skip_auth: false
    params:
      - id: item_links
        type: textarea
        label: 天猫商品链接
        rows: 6
        required: true
        placeholder: "一行一个天猫商品链接"
        hint: 支持直接粘贴多条链接，也支持用顿号、逗号、空格分隔。运行时会按这里填写的链接抓取。
      - id: page_size
        type: select
        label: 每页评价数
        default: "20"
        ui_span: third
        options:
          - value: "10"
            label: 10 条/页
          - value: "20"
            label: 20 条/页（推荐）
        hint: 天猫 MTop 评价接口在 20 条/页时分页最稳定。
      - id: max_pages
        type: number
        label: 每个商品最多抓取页数
        default: 30
        min: 1
        max: 30
        step: 1
        ui_span: third
        hint: 默认最多尝试 30 页，按接口 hasNext 自动提前停止；天猫可能折叠部分评价，接口只返回可见评价明细。
    trigger:
      type: manual
    output:
      - type: excel
        filename: "天猫买家评价_{timestamp}.xlsx"
        columns:
          - 商品ID
          - SKU_ID
          - 商品链接
          - 商品标题
          - 页码
          - 序号
          - 评价ID
          - 买家昵称
          - 评价时间
          - 评分
          - 规格
          - 评价内容
          - 追评内容
          - 追评时间
          - 评价图片
          - 有图
          - 数据来源
          - 执行结果
          - 备注
  - id: diantoushi_review_export
    name: 店透视评价表格导出
    description: 通过已登录 Chrome 中的店透视插件打开商品详情页，依次进入问大家和评价分析，加载评价分页后导出表格
    script: diantoushi-review-export.js
    skip_auth: false
    params:
      - id: item_links
        type: textarea
        label: 商品ID
        rows: 6
        required: true
        placeholder: "一行一个商品ID，例如：1002377057629"
        hint: 仅需填写商品ID。系统会自动拼接为 https://item.taobao.com/item.htm?id=商品ID 后逐个触发店透视导出。
      - id: min_pages
        type: number
        label: 至少加载页数
        default: 30
        min: 1
        max: 100
        step: 1
        ui_span: third
        hint: 评价分析中存在分页时，默认至少尝试加载 30 页后再导出。
      - id: download_timeout_ms
        type: number
        label: 下载等待毫秒
        default: 120000
        min: 10000
        max: 600000
        step: 5000
        ui_span: third
        hint: 点击导出后等待浏览器下载文件完成的最长时间。
      - id: browser_download_dir
        type: directory
        label: 浏览器下载地址
        required: false
        placeholder: "例如：/Users/kennel/Downloads"
        hint: 选择 Chrome/店透视实际下载文件的目录；不填默认使用系统 Downloads。
      - id: merged_output_dir
        type: directory
        label: 合并表输出地址
        required: false
        placeholder: "选填，默认保存到任务输出目录"
        hint: 选填；填写后仅将最终合并表保存到该目录，不填则保存到默认数据输出目录。
      - id: batch_rest_enabled
        type: checkbox
        label: 启用批次休息
        default: true
        ui_span: third
        hint: 默认开启；每抓取一批商品后暂停，并浏览淘宝页面一段时间，降低连续抓取强度。
      - id: batch_rest_after_min
        type: number
        label: 每批最少商品数
        default: 5
        min: 1
        max: 100
        step: 1
        ui_span: third
        hint: 抓取达到该范围后进入批次休息，默认每 5-8 个商品休息一次。
      - id: batch_rest_after_max
        type: number
        label: 每批最多商品数
        default: 8
        min: 1
        max: 100
        step: 1
        ui_span: third
        hint: 与“每批最少商品数”一起形成随机批次大小。
      - id: batch_rest_browse_pages_min
        type: number
        label: 休息浏览最少页数
        default: 2
        min: 1
        max: 10
        step: 1
        ui_span: third
        hint: 批次休息时随机浏览淘宝页面数量，默认 2-3 页。
      - id: batch_rest_browse_pages_max
        type: number
        label: 休息浏览最多页数
        default: 3
        min: 1
        max: 10
        step: 1
        ui_span: third
        hint: 与“休息浏览最少页数”一起形成随机浏览页数。
      - id: batch_rest_min_ms
        type: number
        label: 休息最少毫秒
        default: 180000
        min: 60000
        max: 1800000
        step: 30000
        ui_span: third
        hint: 批次休息总时长下限，默认 3 分钟。
      - id: batch_rest_max_ms
        type: number
        label: 休息最多毫秒
        default: 300000
        min: 60000
        max: 3600000
        step: 30000
        ui_span: third
        hint: 批次休息总时长上限，默认 5 分钟。
      - id: item_delay_min_ms
        type: number
        label: 商品间隔最少秒
        default: 5
        min: 0
        max: 120
        step: 1
        ui_span: third
        hint: 商品之间的随机等待下限，默认 5 秒。
      - id: item_delay_max_ms
        type: number
        label: 商品间隔最多秒
        default: 15
        min: 0
        max: 180
        step: 1
        ui_span: third
        hint: 商品之间的随机等待上限，默认 15 秒。
      - id: page_load_delay_min_ms
        type: number
        label: 翻页间隔最少秒
        default: 3.5
        min: 1
        max: 60
        step: 0.5
        ui_span: third
        hint: 点击“加载下一页/加载更多”后的随机等待下限，默认 3.5 秒。
      - id: page_load_delay_max_ms
        type: number
        label: 翻页间隔最多秒
        default: 9
        min: 1
        max: 120
        step: 0.5
        ui_span: third
        hint: 点击“加载下一页/加载更多”后的随机等待上限，默认 9 秒。
      - id: qa_post_page_min_polls
        type: number
        label: 问大家翻页后最少等待轮数
        default: 3
        min: 0
        max: 20
        step: 1
        ui_span: third
        hint: 每次点击问大家“加载下一页/自动加载”后，如果新页暂时还没明显出数据，至少先等待这么多轮再决定是否导出。
    trigger:
      type: manual
    output:
      - type: excel
        filename: "店透视评价导出记录_{timestamp}.xlsx"
        columns:
          - 商品ID
          - 商品链接
          - 阶段
          - 已加载页数
          - 目标页数
          - 导出文件
          - 问大家导出文件
          - 评价分析导出文件
          - 执行结果
          - 备注
